<!DOCTYPE html>
<html>
<head>

	<meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="normalize.css">
</head>
    <body>
        <div class="centering">
            <h1>From First To Last Discography</h1>
        </div>
        <div class="wrapper">

                        <form>

                                    <div class="item_icon">
                                        <img src="img/plus.svg" alt="plus" class="plus-icon"/>
                                    </div>
                                </div>
                                
                                <div class="box">
                                    <div class="item_image">
                                        <img src="img/Dear Diary.png" />
                                    </div>
                                </div>
                            </label>

                                    </div>
                                </div>
                                
                                <div class="box">
                                    <div class="item_image">
